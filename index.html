<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jQuery (obligatoire uniquement si tu ajoutes d'autres effets) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    body.modal-open {
      overflow: hidden;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
      50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
      100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .zone {
      position: absolute;
      background-color: transparent;
      cursor: pointer;
      z-index: 1;
    }

    .zone:hover {
      box-shadow: 0 0 20px 10px rgba(255, 255, 0, 0.4);
      border-radius: 8px;
    }

    .porte1 { top: 40%; left: 9%; width: 20%; height: 33%; }
    .porte2 { top: 48%; left: 41%; width: 13.5%; height: 25%; }
    .porte3 { top: 54%; left: 60%; width: 10%; height: 19%; }
    .porte4 { top: 57.5%; left: 73.5%; width: 8.5%; height: 16%; }
    .porte5 { top: 60%; left: 84.5%; width: 8%; height: 14%; }

    #logoBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      cursor: pointer;
      animation: pulse 1.2s ease-in-out infinite;
      z-index: 10;
    }

    #popupOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #popupContent {
      width: 90%;
      max-width: 500px;
      background: none;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #popupImage {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    #closePopup {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 24px;
      color: #fff;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <!-- Fond + zones -->
  <div id="container">
    <img src="https://i.imgur.com/AG68Kpz.png" alt="Portes du Dragon">
    <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
  </div>

  <!-- Logo animé -->
  <img src="https://i.imgur.com/uGnH5XI.png" id="logoBtn" alt="Logo Albatros">

  <!-- Popup -->
  <div id="popupOverlay">
    <div id="popupContent">
      <span id="closePopup">&times;</span>
      <img id="popupImage" src="https://i.imgur.com/javiPf0.png" alt="Image popup">
    </div>
  </div>

  <!-- JS -->
  <script>
    const logoBtn = document.getElementById('logoBtn');
    const popup = document.getElementById('popupOverlay');
    const closeBtn = document.getElementById('closePopup');

    logoBtn.addEventListener('click', () => {
      popup.style.display = 'flex';
      document.body.classList.add('modal-open');
    });

    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
      document.body.classList.remove('modal-open');
    });

    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        popup.style.display = 'none';
        document.body.classList.remove('modal-open');
      }
    });
  </script>

</body>
</html>
