<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #container {
      position: relative;
      width: 100vw;
      max-width: 100%;
      height: auto;
      aspect-ratio: 1280 / 853;
    }

    #container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .zone {
      position: absolute;
      display: block;
      background-color: transparent;
      cursor: pointer;
      transition: box-shadow 0.3s ease;
    }

    .zone:hover {
      box-shadow: 0 0 20px 10px rgba(255, 255, 0, 0.4);
      border-radius: 8px;
    }

    .porte1 { top: 40%; left: 9%; width: 20%; height: 33%; }
    .porte2 { top: 48%; left: 41%; width: 13.5%; height: 25%; }
    .porte3 { top: 54%; left: 60%; width: 10%; height: 19%; }
    .porte4 { top: 57.5%; left: 73.5%; width: 8.5%; height: 16%; }
    .porte5 { top: 60%; left: 84.5%; width: 8%; height: 14%; }
  </style>
</head>
<body>
  <div id="container">
    <img src="https://i.imgur.com/AG68Kpz.png" alt="Portes du Dragon">
    <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
  </div>
</body>
</html>
