<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: url('https://i.imgur.com/AG68Kpz.png') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    .zone {
      position: absolute;
      display: block;
      background-color: rgba(255, 0, 0, 0.3); /* à rendre transparent ensuite */
      cursor: pointer;
    }

    /* Exemple de positions approximatives */
    .porte1 { top: 30%; left: 10%; width: 10%; height: 20%; }
    .porte2 { top: 30%; left: 28%; width: 10%; height: 20%; }
    .porte3 { top: 30%; left: 46%; width: 10%; height: 20%; }
    .porte4 { top: 30%; left: 64%; width: 10%; height: 20%; }
    .porte5 { top: 30%; left: 82%; width: 10%; height: 20%; }
  </style>
</head>
<body>
  <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
</body>
</html>
