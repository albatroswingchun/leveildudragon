<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    body.modal-open {
      overflow: hidden;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
      50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
      100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
    }

    #container {
      overflow-y: auto;
      overflow-x: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
      touch-action: none;
    }

    #zoomWrapper {
      width: 100%;
      height: auto;
      touch-action: none;
    }

    .imageWrapper {
      position: relative;
      width: 100%;
      height: auto;
    }

    .imageWrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .zone {
      position: absolute;
      background-color: transparent;
      cursor: pointer;
      z-index: 2;
    }

    .zone:hover {
      box-shadow: 0 0 20px 10px rgba(255, 255, 0, 0.4);
      border-radius: 8px;
    }

    .porte1 { top: 40%; left: 9%; width: 20%; height: 33%; }
    .porte2 { top: 48%; left: 41%; width: 13.5%; height: 25%; }
    .porte3 { top: 54%; left: 60%; width: 10%; height: 19%; }
    .porte4 { top: 57.5%; left: 73.5%; width: 8.5%; height: 16%; }
    .porte5 { top: 60%; left: 84.5%; width: 8%; height: 14%; }

    #logoBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      cursor: pointer;
      animation: pulse 2.4s ease-in-out infinite;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    #logoBtn img {
      width: 100%;
      height: 100%;
      transform: scale(1.4);
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    #logoBtn:hover img {
      transform: scale(1.5);
    }

    #popupOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #popupContent {
      width: 90%;
      max-width: 500px;
      background: none;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #popupImage {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    #closePopup {
      position: absolute;
      top: 10px;
      right: 15px;
      width: 28px;
      height: 28px;
      background: rgba(50, 50, 50, 0.3);
      font-size: 42px;
      color: white;
      border-radius: 50%;
      padding: 8px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      user-select: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    #closePopup:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      font-size: 23px;
      color: white;
      background: rgba(128, 128, 128, 0.3);
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      user-select: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .arrow:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-50%) scale(1.1);
    }

    .arrow.left { left: 5px; }
    .arrow.right { right: 4px; }

    #scrollTarget {
      position: absolute;
      top: 63%;
      left: 0;
      width: 100%;
      height: 1px;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="zoomWrapper">
      <div class="imageWrapper">
        <img id="mainImage" src="https://i.imgur.com/AG68Kpz.png" alt="Portes du Dragon">
        <div id="scrollTarget"></div>
        <a href="#" class="zone porte1"></a>
        <a href="#" class="zone porte2"></a>
        <a href="#" class="zone porte3"></a>
        <a href="#" class="zone porte4"></a>
        <a href="#" class="zone porte5"></a>
      </div>
    </div>
  </div>

  <div id="logoBtn">
    <img src="https://i.imgur.com/uGnH5XI.png" alt="Logo Albatros">
  </div>

  <div id="popupOverlay">
    <div id="popupContent">
      <span id="closePopup">&times;</span>
      <div class="arrow left" id="prevBtn">&#8592;</div>
      <img id="popupImage" src="" alt="Image popup">
      <div class="arrow right" id="nextBtn">&#8594;</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@9.4.0/dist/panzoom.min.js"></script>
  <script>
    const logoBtn = document.getElementById('logoBtn');
    const popup = document.getElementById('popupOverlay');
    const closeBtn = document.getElementById('closePopup');
    const popupImage = document.getElementById('popupImage');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');

    const imageList = [
      "https://i.imgur.com/uGnH5XI.png",
      "https://i.imgur.com/javiPf0.png",
      "https://i.imgur.com/5NDY8VE.png",
      "https://i.imgur.com/exxUNyF.png",
      "https://i.imgur.com/QZZqsrk.png",
      "https://i.imgur.com/6GtLt0X.png"
    ];

    let currentIndex = 0;

    function updateImage() {
      popupImage.src = imageList[currentIndex];
      prevBtn.style.display = currentIndex === 0 ? 'none' : 'block';
      nextBtn.style.display = currentIndex === imageList.length - 1 ? 'none' : 'block';
    }

    logoBtn.addEventListener('click', () => {
      popup.style.display = 'flex';
      document.body.classList.add('modal-open');
      currentIndex = 0;
      updateImage();
    });

    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
      document.body.classList.remove('modal-open');
    });

    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        popup.style.display = 'none';
        document.body.classList.remove('modal-open');
      }
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (currentIndex < imageList.length - 1) {
        currentIndex++;
        updateImage();
      }
    });

    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (currentIndex > 0) {
        currentIndex--;
        updateImage();
      }
    });

    const zoomArea = document.getElementById('zoomWrapper');
    panzoom(zoomArea, {
      maxZoom: 5,
      minZoom: 1,
      bounds: true,
      boundsPadding: 0.2
    });
    
      window.addEventListener('load', () => {
        const container = document.getElementById('container');
        const image = document.getElementById('mainImage');

        function scrollToImagePercent(percent) {
          const imageHeight = image.offsetHeight;
          const scrollY = imageHeight * percent - container.clientHeight / 2;
          container.scrollTop = scrolly;
        }

        function waitUntilImageLoaded(callback, maxTries = 20) {
          let tries = 0;
          function tryScroll() {
            if (image.complete && image.offsetHeight > 0) {
              callback();
            } else if (tries < maxTries) {
              tries++;
              setTimeout(tryScroll, 100);
            }
          }
          tryScroll();
        }

        waitUntilImageLoaded(() => {
          scrollToImagePercent(0.63);
        });
      });
    </script>
</body>
</html>
