<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Turn.js & jQuery -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
      50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
      100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .zone {
      position: absolute;
      display: block;
      background-color: transparent;
      cursor: pointer;
      transition: box-shadow 0.3s ease;
      z-index: 1;
    }

    .zone:hover {
      box-shadow: 0 0 20px 10px rgba(255, 255, 0, 0.4);
      border-radius: 8px;
    }

    .porte1 { top: 40%; left: 9%; width: 20%; height: 33%; }
    .porte2 { top: 48%; left: 41%; width: 13.5%; height: 25%; }
    .porte3 { top: 54%; left: 60%; width: 10%; height: 19%; }
    .porte4 { top: 57.5%; left: 73.5%; width: 8.5%; height: 16%; }
    .porte5 { top: 60%; left: 84.5%; width: 8%; height: 14%; }
    
    #logoBtn {
      background-image: url('https://i.imgur.com/yourBackground.png');
      background-size: cover;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      cursor: pointer;
      animation: pulse 1.2s ease-in-out infinite;
      z-index: 10;
    }

    #popupOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #popupContent {
      background: url('https://i.imgur.com/d0Ecj9e.png') no-repeat center;
      background-size: cover;
      width: 80%;
      max-width: 500px;
      aspect-ratio: 3/4;
      padding: 40px 20px;
      color: #fff8dc;
      text-align: center;
      position: relative;
      font-family: 'Georgia', serif;
      box-shadow: 0 0 20px rgba(255, 223, 128, 0.5);
      border-radius: 12px;
    }

     #closePopup {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 24px;
      color: #000;
      z-index: 1000;
    }

    .flipbook {
  width: 100%;
  height: 100%;
}

.flipbook .page {
  width: 100%;
  height: 100%;
  background: white;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}

.flipbook img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
  </style>
</head>
<body>

  <!-- Image de fond + zones cliquables -->
  <div id="container">
    <img src="https://i.imgur.com/AG68Kpz.png" alt="Portes du Dragon">
    <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
  </div>

  <!-- Logo animé -->
  <img src="https://i.imgur.com/uGnH5XI.png" id="logoBtn" alt="Logo Albatros">

  <!-- Pop-up avec Flipbook -->
  <div id="popupOverlay">
    <div id="popupContent">
      <span id="closePopup">&times;</span>
      <div class="flipbook">
        <div class="page"><img src="https://i.imgur.com/uGnH5XI.png" alt="Page 1"></div>
        <div class="page"><img src="https://i.imgur.com/javiPf0.png" alt="Page 2"></div>
        <div class="page"><img src="https://i.imgur.com/5NDY8VE.png" alt="Page 3"></div>
        <div class="page"><img src="https://i.imgur.com/exxUNyF.png" alt="Page 4"></div>
        <div class="page"><img src="https://i.imgur.com/QZZqsrk.png" alt="Page 5"></div>
        <div class="page"><img src="https://i.imgur.com/6GtLt0X.png" alt="Page 6"></div>
        <!-- Ajoute autant de pages que tu veux -->
      </div>
    </div>
  </div>
  
 <!-- Scripts -->
  <script>
    const logoBtn = document.getElementById('logoBtn');
    const popup = document.getElementById('popupOverlay');
    const closeBtn = document.getElementById('closePopup');

    logoBtn.addEventListener('click', () => {
      popup.style.display = 'flex';
    });

    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        popup.style.display = 'none';
      }
    });

    $(document).ready(function() {
      $('.flipbook').turn({
        width: 400,
        height: 500,
        autoCenter: true
        elevation: 50,
        gradients: true
      });
    });
  </script>

</body>
</html>
