<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #container {
      position: relative;
      width: 90vw;      /* image responsive */
      max-width: 1280px;
      aspect-ratio: 1280 / 853;
    }

    #container img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .zone {
      position: absolute;
      display: block;
      background-color: rgba(255, 0, 0, 0.3); /* pour test */
      cursor: pointer;
    }

    /* Zones positionnées en POURCENTAGE pour suivre l’image */
    .porte1 { top: 38.5%; left: 9.5%; width: 10.5%; height: 30.5%; }
    .porte2 { top: 39%;   left: 30%;  width: 10%;   height: 29%; }
    .porte3 { top: 38%;   left: 49%;  width: 10.5%; height: 30%; }
    .porte4 { top: 38.5%; left: 68%;  width: 9.5%;  height: 30%; }
    .porte5 { top: 39%;   left: 85.5%; width: 8%;   height: 30%; }
  </style>
</head>
<body>
  <div id="container">
    <img src="https://i.imgur.com/AG68Kpz.png" alt="Portes du Dragon">
    <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
  </div>
</body>
</html>
