<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: url('https://i.imgur.com/AG68Kpz.png') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    .zone {
      position: absolute;
      display: block;
      background-color: rgba(255, 0, 0, 0.3); /* à rendre transparent ensuite */
      cursor: pointer;
    }

    /* Positions précises des 5 portes (depuis la capture) */
    .porte1 { top: 38.5%; left: 10.5%; width: 11%; height: 31%; }
    .porte2 { top: 39%; left: 30.2%; width: 10.3%; height: 29%; }
    .porte3 { top: 38%; left: 49.5%; width: 10.5%; height: 30%; }
    .porte4 { top: 38.5%; left: 68%; width: 9.5%; height: 30%; }
    .porte5 { top: 39%; left: 85.7%; width: 8%; height: 30%; }
  </style>
</head>
<body>
  <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
  <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
</body>
</html>
