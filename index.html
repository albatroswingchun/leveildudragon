<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Leveil du Dragon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #container {
      position: relative;
      width: 1280px;
      height: 853px;
      background-image: url('https://i.imgur.com/AG68Kpz.png');
      background-size: cover;
      background-position: center;
    }

    .zone {
      position: absolute;
      display: block;
      background-color: rgba(255, 0, 0, 0.3); /* debug */
      cursor: pointer;
    }

    /* Zones en pixels */
    .porte1 { top: 400px; left: 110px; width: 200px; height: 260px; }
    .porte2 { top: 335px; left: 380px; width: 130px; height: 250px; }
    .porte3 { top: 320px; left: 635px; width: 135px; height: 255px; }
    .porte4 { top: 325px; left: 860px; width: 120px; height: 250px; }
    .porte5 { top: 330px; left: 1060px; width: 105px; height: 250px; }
  </style>
</head>
<body>
  <div id="container">
    <a href="https://leveildudragon.carrd.co" class="zone porte1"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte2"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte3"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte4"></a>
    <a href="https://leveildudragon.carrd.co" class="zone porte5"></a>
  </div>
</body>
</html>
